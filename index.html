<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Review Analyser</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    textarea { width: 100%; height: 120px; font-size: 15px; padding: 10px; box-sizing: border-box; }
    button { margin-top: 10px; padding: 10px 24px; font-size: 15px; cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 6px; }
    #result { margin-top: 24px; }
    .badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 16px; }
    .positive { background: #d4edda; color: #155724; }
    .negative { background: #f8d7da; color: #721c24; }
    .mixed    { background: #fff3cd; color: #856404; }
    .neutral  { background: #e2e3e5; color: #383d41; }
    .keywords { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { background: #e9ecef; padding: 4px 12px; border-radius: 12px; font-size: 14px; }
    #error { color: red; margin-top: 12px; }
  </style>
</head>
<body>
  <h2>Review Analyser</h2>
  <textarea id="review" placeholder="Paste a product review here..."></textarea>
  <br>
  <button onclick="analyze()">Analyze</button>
  <div id="error"></div>
  <div id="result"></div>

  <script>
    // ⚠️ PASTE YOUR VALUES BELOW (workshop demo only — don't share this file publicly)
    const KEY = "PASTE_YOUR_KEY_1_HERE";
    const ENDPOINT = "PASTE_YOUR_ENDPOINT_HERE"; // e.g. https://lang-workshop-demo.cognitiveservices.azure.com/

    async function call(kind, text) {
      const res = await fetch(`${ENDPOINT}language/:analyze-text?api-version=2023-04-01`, {
        method: "POST",
        headers: {
          "Ocp-Apim-Subscription-Key": KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          kind,
          analysisInput: { documents: [{ id: "1", language: "en", text }] }
        })
      });
      return res.json();
    }

    async function analyze() {
      const text = document.getElementById("review").value.trim();
      document.getElementById("error").innerText = "";
      document.getElementById("result").innerHTML = "Analyzing...";
      if (!text) { document.getElementById("result").innerHTML = ""; return; }

      try {
        const [sentRes, kpRes] = await Promise.all([
          call("SentimentAnalysis", text),
          call("KeyPhraseExtraction", text)
        ]);

        const sentiment = sentRes.results.documents[0].sentiment;
        const keyPhrases = kpRes.results.documents[0].keyPhrases;

        const chips = keyPhrases.map(k => `<span class="chip">${k}</span>`).join("");
        document.getElementById("result").innerHTML = `
          <span class="badge ${sentiment}">${sentiment.toUpperCase()}</span>
          <div class="keywords">${chips || "<span class='chip'>No keywords found</span>"}</div>
        `;
      } catch (e) {
        document.getElementById("error").innerText = "Error: " + e.message;
        document.getElementById("result").innerHTML = "";
      }
    }
  </script>
</body>
</html>
